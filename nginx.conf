events {}
http {
    map $http_origin $allow_origin {
        default "";
        "~^https?://localhost(:[0-9]+)?$" $http_origin;
        "https://staging.app.sloyd.ai"     $http_origin;
        "https://app.sloyd.ai"             $http_origin;
    }
    server {
        listen 80 default backlog=16384;
        listen [::]:80 default backlog=16384;

        location / {
            # 1. Clear headers sent by Mixpanel to prevent duplicates
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';

            # 2. Add our own controlled headers
            add_header 'Access-Control-Allow-Origin' $allow_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' '*' always;
            add_header 'Vary' 'Origin' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            # Map the fake paths back to real Mixpanel paths
            rewrite ^/c/(.*)$ /track/$1 break;
            rewrite ^/e/(.*)$ /engage/$1 break;
            rewrite ^/g/(.*)$ /groups/$1 break;
            rewrite ^/r/(.*)$ /record/$1 break;
            rewrite ^/f/(.*)$ /flags/$1 break;
            rewrite ^/d/(.*)$ /decide/$1 break;

            proxy_set_header Host api.mixpanel.com;
            proxy_set_header X-Real-IP $http_x_forwarded_for;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass https://api.mixpanel.com;
        }

        # Serve the JS library from a different path
        location /m.js {
            add_header 'Access-Control-Allow-Origin' $allow_origin always;
            proxy_pass https://cdn.mxpnl.com/libs/mixpanel-2-latest.min.js;
        }
    }
}
